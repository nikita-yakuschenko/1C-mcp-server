# Qdrant + MCP-сервер 1C UPP Docs
# Локально: docker compose up -d → MCP на http://localhost:8000/mcp, Qdrant на :6333
# В Dokploy: добавьте приложение из этого compose, задайте домен в UI или раскомментируйте labels ниже
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  mcp:
    build: .
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - COLLECTION_NAME=${COLLECTION_NAME:-1c_upp_docs}
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - MCP_PATH=/mcp
      - EMBED_MODEL=${EMBED_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
    depends_on:
      - qdrant
    restart: unless-stopped
    # Traefik (Dokploy): порт 8000 — MCP слушает на 8000
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.upp-mcp-pinigp-37-web.rule=Host(`mcp.module.team`)"
      - "traefik.http.routers.upp-mcp-pinigp-37-web.entrypoints=web"
      - "traefik.http.routers.upp-mcp-pinigp-37-web.middlewares=redirect-to-https@file"
      - "traefik.http.routers.upp-mcp-pinigp-37-web.service=upp-mcp-pinigp-37-web"
      - "traefik.http.services.upp-mcp-pinigp-37-web.loadbalancer.server.port=8000"
      - "traefik.http.routers.upp-mcp-pinigp-37-websecure.rule=Host(`mcp.module.team`)"
      - "traefik.http.routers.upp-mcp-pinigp-37-websecure.entrypoints=websecure"
      - "traefik.http.routers.upp-mcp-pinigp-37-websecure.service=upp-mcp-pinigp-37-websecure"
      - "traefik.http.routers.upp-mcp-pinigp-37-websecure.tls.certresolver=letsencrypt"
      - "traefik.http.services.upp-mcp-pinigp-37-websecure.loadbalancer.server.port=8000"
    networks:
      - default
      - dokploy-network

# Сеть dokploy-network создаётся Dokploy; для локального запуска закомментируйте labels и networks выше
networks:
  dokploy-network:
    external: true

volumes:
  qdrant_storage:
